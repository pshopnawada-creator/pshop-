<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Portal</title>
    <style>
        /* Screen ko pura fill karne ke liye */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000; /* Loading ke waqt black dikhega */
        }

        /* Webview setup */
        .web-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        id="myFrame"
        src="https://019decfc-030c-7049-b3e1-b3b0b52f4e7c.arena.site/" 
        class="web-container"
        allowfullscreen>
    </iframe>

    <script>
        // JS se ensure karna ki link load ho jaye
        window.onload = function() {
            var frame = document.getElementById('myFrame');
            // Agar link load hone mein koi rukawat ho toh redirect trigger karein
            if(!frame.src) {
                window.location.replace("https://019decfc-030c-7049-b3e1-b3b0b52f4e7c.arena.site/");
            }
        };
    </script>

</body>
</html>
