<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web App</title>
    <style>
        /* Screen ko pura cover karne ke liye styling */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Scrollbars ko hide karne ke liye */
            background-color: #f4f4f4;
        }

        /* Iframe ko full screen banane ke liye */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe src="https://019decfc-030c-7049-b3e1-b3b0b52f4e7c.arena.site/" 
            title="Embedded Content"
            allowfullscreen>
    </iframe>

</body>
</html>
